<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Museum Guide</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
    }

    #status {
      font-size: 24px;
      margin: 10px;
      font-weight: bold;
    }

    iframe {
      width: 95%;
      height: 60vh;
      border-radius: 12px;
      border: none;
    }
  </style>
</head>

<body>

  <h1>Museum Guide</h1>
  <div id="status">Περιμένω έκθεμα...</div>

  <iframe id="player"
    src=""
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <script>
    const channelID = "3324930";

    const videos = {
      "1": {
        title: "Έκθεμα 1: Παρθενώνας",
        url: "https://www.youtube.com/embed/7NusBTC9dZs?autoplay=1&mute=0"
      },
      "2": {
        title: "Έκθεμα 2: Αρχαίο Αγγείο",
        url: "https://www.youtube.com/embed/ZLu-Pc1f_Tw?autoplay=1&mute=0"
      }
    };

    let lastValue = "";

    async function checkThingSpeak() {
      try {
        const response = await fetch(`https://api.thingspeak.com/channels/${channelID}/fields/1/last.txt`);
        const value = (await response.text()).trim();

        if (value !== lastValue && videos[value]) {
          lastValue = value;

          document.getElementById("status").innerText = videos[value].title;

          const player = document.getElementById("player");
          player.src = videos[value].url;
        }

      } catch (error) {
        document.getElementById("status").innerText = "Σφάλμα σύνδεσης";
      }
    }

    setInterval(checkThingSpeak, 3000);
    checkThingSpeak();
  </script>

</body>
</html>
